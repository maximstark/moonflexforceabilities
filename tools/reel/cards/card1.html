<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card1</title>
<style>
  /* MOONFLEX FORCE ABILITIES — the logo card. Content lives in the center
     1080x1080 so the square crop keeps everything. Homemade NES bootleg. */
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; background:#16131f; overflow:hidden;
    font-family:"Courier New",monospace; position:relative; }
  .star{ position:absolute; background:#fff6d8; }
  .star.g{ background:#ffe48a; } .star.p{ background:#ffd9f0; }
  #panel{ position:absolute; left:70px; right:70px; top:640px; height:640px;
    background:rgba(16,10,26,.92); border:6px solid #ffe48a;
    box-shadow:0 0 0 6px #16131f, 0 0 90px rgba(255,228,138,.16);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px; }
  .stud{ position:absolute; width:22px; height:22px; background:#ffe48a; }
  h1{ color:#ffe48a; font-weight:bold; text-align:center; line-height:1.06;
    font-size:118px; letter-spacing:2px;
    text-shadow:8px 8px 0 #3a1f4a, -3px -3px 0 #16131f; }
  h1 span{ display:inline-block; }
  h1 .w1{ transform:translateY(-8px) rotate(-1.2deg); }
  h1 .w3{ transform:translateY(6px) rotate(1deg); }
  #sub{ color:#ffd9f0; font-size:44px; letter-spacing:10px; }
  #tag{ position:absolute; left:50%; top:1330px; transform:translateX(-50%) rotate(-2deg);
    background:#ff6ea8; color:#16131f; font-weight:bold; font-size:40px;
    padding:16px 40px; letter-spacing:4px; box-shadow:8px 8px 0 #3a1f4a; }
  #scan{ position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 4px, transparent 4px 8px); }
  #vig{ position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 46%, transparent 55%, rgba(0,0,0,.5)); }
</style></head>
<body>
<script>
  // a deterministic little starfield (no Math.random — same card every shoot)
  const h = i => { const s = Math.sin(i * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };
  for (let i = 0; i < 90; i++) {
    const d = document.createElement("div");
    const sz = 4 + Math.floor(h(i + 9) * 3) * 4;
    d.className = "star" + (h(i + 3) > .8 ? " g" : h(i + 5) > .8 ? " p" : "");
    d.style.cssText = `left:${(h(i) * 1060) | 0}px; top:${(h(i + 41) * 1880) | 0}px;
      width:${sz}px; height:${sz}px; opacity:${(.25 + h(i + 7) * .75).toFixed(2)};`;
    document.body.appendChild(d);
  }
</script>
<div id="panel">
  <h1><span class="w1">MOONFLEX</span><br><span class="w3">FORCE<br>ABILITIES</span></h1>
  <div id="sub">· AN ARCADE DREAM ·</div>
  <div class="stud" style="left:-6px;top:-6px"></div>
  <div class="stud" style="right:-6px;top:-6px"></div>
  <div class="stud" style="left:-6px;bottom:-6px"></div>
  <div class="stud" style="right:-6px;bottom:-6px"></div>
</div>
<div id="tag">100% HOMEMADE BOOTLEG</div>
<div id="scan"></div><div id="vig"></div>
</body></html>
