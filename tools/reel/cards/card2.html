<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card2</title>
<style>
  /* the credit card: a dream made by Josie, age 4. Center-1080 safe. */
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; background:#16131f; overflow:hidden;
    font-family:"Courier New",monospace; position:relative; }
  .star{ position:absolute; background:#fff6d8; }
  .heart{ position:absolute; color:#ff6ea8; font-size:64px;
    text-shadow:6px 6px 0 #3a1f4a; }
  #wrap{ position:absolute; left:0; right:0; top:760px; text-align:center;
    display:flex; flex-direction:column; gap:44px; }
  #pre{ color:#ffd9f0; font-size:52px; letter-spacing:8px; }
  #name{ color:#ffe48a; font-weight:bold; font-size:150px; line-height:1.05;
    text-shadow:10px 10px 0 #3a1f4a; transform:rotate(-1.4deg); }
  #age{ color:#ffe48a; font-size:74px; font-weight:bold;
    text-shadow:6px 6px 0 #3a1f4a; }
  #post{ color:#b9b2d8; font-size:40px; letter-spacing:2px; }
  #scan{ position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 4px, transparent 4px 8px); }
  #vig{ position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 48%, transparent 55%, rgba(0,0,0,.5)); }
</style></head>
<body>
<script>
  const h = i => { const s = Math.sin(i * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };
  for (let i = 0; i < 70; i++) {
    const d = document.createElement("div");
    d.className = "star";
    d.style.cssText = `left:${(h(i) * 1060) | 0}px; top:${(h(i + 41) * 1880) | 0}px;
      width:4px; height:4px; opacity:${(.2 + h(i + 7) * .6).toFixed(2)};`;
    document.body.appendChild(d);
  }
  [[120, 660, -8], [880, 700, 6], [200, 1290, 5], [830, 1330, -7]].forEach(([x, y, r]) => {
    const d = document.createElement("div");
    d.className = "heart"; d.textContent = "♥";
    d.style.cssText = `left:${x}px; top:${y}px; transform:rotate(${r}deg);`;
    document.body.appendChild(d);
  });
</script>
<div id="wrap">
  <div id="pre">a dream made by</div>
  <div id="name">JOSIE</div>
  <div id="age">AGE 4</div>
  <div id="post">(now with 100% more everything)</div>
</div>
<div id="scan"></div><div id="vig"></div>
</body></html>
