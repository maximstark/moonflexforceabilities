<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>card3</title>
<style>
  /* the closer: come dream. URL pill + PRESS ENTER. Center-1080 safe. */
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; background:#16131f; overflow:hidden;
    font-family:"Courier New",monospace; position:relative; }
  .star{ position:absolute; background:#fff6d8; }
  .star.g{ background:#ffe48a; }
  #wrap{ position:absolute; left:0; right:0; top:700px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:52px; }
  #big{ color:#ffe48a; font-weight:bold; font-size:128px; line-height:1.08;
    text-shadow:9px 9px 0 #3a1f4a; }
  #free{ color:#ffd9f0; font-size:46px; letter-spacing:5px; }
  #url{ background:#ffe48a; color:#16131f; font-weight:bold; font-size:37px;
    padding:22px 34px; letter-spacing:1px; box-shadow:9px 9px 0 #3a1f4a;
    transform:rotate(-1deg); }
  #enter{ color:#ffe48a; font-size:60px; font-weight:bold; letter-spacing:8px;
    margin-top:26px; text-shadow:0 0 40px rgba(255,228,138,.6); }
  #worlds{ color:#b9b2d8; font-size:38px; letter-spacing:3px; }
  #scan{ position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 4px, transparent 4px 8px); }
  #vig{ position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 48%, transparent 55%, rgba(0,0,0,.5)); }
</style></head>
<body>
<script>
  const h = i => { const s = Math.sin(i * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };
  for (let i = 0; i < 90; i++) {
    const d = document.createElement("div");
    const sz = 4 + Math.floor(h(i + 9) * 2) * 4;
    d.className = "star" + (h(i + 3) > .82 ? " g" : "");
    d.style.cssText = `left:${(h(i) * 1060) | 0}px; top:${(h(i + 41) * 1880) | 0}px;
      width:${sz}px; height:${sz}px; opacity:${(.25 + h(i + 7) * .7).toFixed(2)};`;
    document.body.appendChild(d);
  }
</script>
<div id="wrap">
  <div id="big">COME<br>DREAM</div>
  <div id="worlds">12 WORLDS · FREE IN YOUR BROWSER</div>
  <div id="url">maximstark.github.io/moonflexforceabilities</div>
  <div id="enter">▶ PRESS ENTER</div>
  <div id="free">no app. no ads. one swan.</div>
</div>
<div id="scan"></div><div id="vig"></div>
</body></html>
