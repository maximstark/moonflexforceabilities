<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MoonFlexForceAbilities — vertical slice</title>
<style>
  html, body { margin:0; padding:0; background:#16131f; height:100%; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";

/* =====================================================================
 *  TUNING — every feel-relevant number lives here. Units are pixels per
 *  frame (the game runs a fixed 60 Hz simulation), frames, or plain
 *  counts. Tweak, refresh, replay.
 * ===================================================================== */
const TUNING = {
  // --- display ---
  SCALE: 3,                  // integer pixel scale
  VIEW_W: 384,               // internal resolution (24 x 15 tiles)
  VIEW_H: 240,

  // --- player body (tile-collision box; sprite is drawn around it) ---
  PLAYER_W: 18,
  PLAYER_H: 26,
  HURTBOX_INSET: 3,          // hurt-box is this much smaller than the body on every side
  STOMP_MARGIN: 3,           // stomp-box is this much wider than the body on each side
  STOMP_GRACE: 6,            // px: how far past an enemy's head a stomp still counts

  // --- ground movement ---
  GROUND_ACCEL: 0.22,        // px/frame^2 while holding a direction
  GROUND_DECEL: 0.30,        // friction when no input
  TURN_ACCEL: 0.50,          // extra grip when reversing (skid feel)
  MAX_RUN_SPEED: 2.0,

  // --- air movement ---
  AIR_ACCEL: 0.14,
  AIR_DECEL: 0.03,           // air keeps momentum; barely any drag

  // --- jump ---
  GRAVITY_RISE: 0.30,        // gravity while moving up
  GRAVITY_FALL: 0.44,        // gravity while falling (snappier descent)
  JUMP_VEL: 5.8,             // initial jump impulse (~3.5 tiles with apex float)
  JUMP_CUT_MULT: 0.38,       // multiply vy by this when jump is released early
  APEX_SPEED: 0.7,           // |vy| below this counts as "the apex"
  APEX_GRAVITY_MULT: 0.5,    // gravity multiplier at the apex (the float)
  MAX_FALL_SPEED: 6.5,
  COYOTE_FRAMES: 6,          // grace frames after walking off a ledge
  JUMP_BUFFER_FRAMES: 7,     // early-press grace before landing
  CORNER_CORRECTION_PX: 3,   // nudge past ledge/ceiling snags up to this deep
  STOMP_BOUNCE: 3.2,         // bounce off a stomped enemy (tap)
  STOMP_BOUNCE_HELD: 4.9,    // bounce while holding jump

  // --- water / swimming ---
  WATER_GRAVITY: 0.07,
  WATER_MAX_FALL: 1.3,       // slow sink
  WATER_ACCEL_SWAN: 0.10,
  WATER_ACCEL_MERMAID: 0.18,
  WATER_DRAG: 0.05,
  WATER_MAX_SPEED_SWAN: 1.3,
  WATER_MAX_SPEED_MERMAID: 2.3,
  SWIM_STROKE_SWAN: 2.5,     // upward impulse per jump press underwater
  SWIM_STROKE_MERMAID: 3.2,
  SWIM_STROKE_COOLDOWN: 8,   // frames between strokes
  WATER_EXIT_BOOST: 4.6,     // leap when stroking near the surface
  WATER_EXIT_ZONE: 14,       // px from surface that counts as "near"
  WATER_ENTRY_DAMP: 0.35,    // vy multiplier on splashdown

  // --- health & damage ---
  MAX_HEARTS: 3,
  IFRAMES: 90,               // invincibility frames after a hit
  KNOCKBACK_X: 2.4,
  KNOCKBACK_Y: 3.0,

  // --- happiness ---
  HAPPINESS_MAX: 100,
  HAPPINESS_DRAIN: 0.04,     // per frame (~42 s from full to panic)
  TREAT_REFILL: 45,
  PANIC_PLAYER_MULT: 0.5,    // player speed at zero happiness
  PANIC_ENEMY_MULT: 1.5,     // enemy speed at zero happiness

  // --- enemies ---
  ENEMY_GRAVITY: 0.32,
  ENEMY_MAX_FALL: 6,
  FROG_RANGE: 150,           // notices the player inside this distance
  FROG_HOP_INTERVAL: 75,     // frames between hops
  FROG_WINDUP: 22,           // crouch frames before a hop
  FROG_HOP_VX: 1.6,
  FROG_HOP_VY: 3.6,
  ROACH_SPEED: 1.1,
  DINO_SPEED: 0.45,
  DINO_HP: 2,
  ENEMY_HIT_IFRAMES: 30,     // dino flash time between stomps

  // --- boss: Grumpis Scrumption ---
  BOSS_HP: 3,
  BOSS_IFRAMES: 75,
  BOSS_HURT_FLASH: 35,       // frames the hurt face shows after a stomp
  BOSS_WINDUP: 55,           // telegraphed shake before a lunge
  BOSS_LUNGE_VX: 3.2,
  BOSS_LUNGE_VY: 4.2,
  BOSS_RECOVER: 75,          // vulnerable rest after landing
  BOSS_ACTIVATE_DIST: 280,
  BOSS_DEATH_FRAMES: 80,

  // --- scoring & the name store ---
  POINTS_POPCORN: 50,
  POINTS_STOMP: 100,
  POINTS_BOSS: 5000,
  LETTER_COST: 100,          // each letter of your name costs this many points
  NAME_MAX_LEN: 8,

  // --- camera ---
  CAM_LERP: 0.12,
  CAM_LOOKAHEAD: 24,         // pixels ahead of the swan's beak
  SHAKE_FRAMES: 6,           // boss-landing camera shake
};
const T = TUNING;

/* TODO(co-op): second player (Charmgirl) + shared camera — out of slice scope.
 * TODO(costumes): costume-shedding / upgrade stacking — player.form is the seam to build on.
 * TODO(treasure-box): power chooser (Fire etc.) would hang off a player.power field.
 * TODO(hub): replace the title screen with the hub house + elevator level select.
 * TODO(audio): comically cute, slightly bad NES chiptunes. */

/* ===================== canvas ===================== */
const canvas = document.getElementById("game");
canvas.width  = T.VIEW_W * T.SCALE;
canvas.height = T.VIEW_H * T.SCALE;
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

/* ===================== input ===================== */
// each physical key maps to one or more logical actions
const KEYMAP = {
  ArrowLeft:["left"],  KeyA:["left"],
  ArrowRight:["right"],KeyD:["right"],
  ArrowUp:["jump","up"], KeyW:["jump","up"],
  ArrowDown:["down"],  KeyS:["down"],
  Space:["jump"],
  ShiftLeft:["transform"], ShiftRight:["transform"], KeyE:["transform"],
  Escape:["pause"],
  Enter:["confirm"],
  Backspace:["rub"],
};
const held = {};            // action -> bool
let justPressed = new Set(); // actions pressed since last consumed update
window.addEventListener("keydown", e => {
  const acts = KEYMAP[e.code];
  if (!acts) return;
  e.preventDefault();
  if (!e.repeat) for (const a of acts) { held[a] = true; justPressed.add(a); }
});
window.addEventListener("keyup", e => {
  const acts = KEYMAP[e.code];
  if (!acts) return;
  for (const a of acts) held[a] = false;
});
const pressed = a => justPressed.has(a);

/* ===================== assets ===================== */
let sheets = null;   // name -> {img, frame_w, frame_h, frames, index}
let level = null;    // pristine parsed level1.json

async function loadAll() {
  const manifest = await (await fetch("assets/manifest.json")).json();
  sheets = {};
  await Promise.all(Object.entries(manifest).map(([name, m]) => new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      sheets[name] = { img, frame_w: m.frame_w, frame_h: m.frame_h, frames: m.frames,
                       index: Object.fromEntries(m.frames.map((f, i) => [f, i])) };
      res();
    };
    img.onerror = () => rej(new Error("failed to load " + m.file));
    img.src = m.file;
  })));
  level = await (await fetch("level1.json")).json();
}

// draw frame `frame` of sheet `name` with its top-left at world-ish coords (already camera-adjusted)
function drawFrame(name, frame, x, y, flip = false) {
  const s = sheets[name];
  const i = s.index[frame];
  x = Math.round(x); y = Math.round(y);
  if (flip) {
    ctx.save();
    ctx.translate(x + s.frame_w, y);
    ctx.scale(-1, 1);
    ctx.drawImage(s.img, i * s.frame_w, 0, s.frame_w, s.frame_h, 0, 0, s.frame_w, s.frame_h);
    ctx.restore();
  } else {
    ctx.drawImage(s.img, i * s.frame_w, 0, s.frame_w, s.frame_h, x, y, s.frame_w, s.frame_h);
  }
}

/* ===================== level & collision ===================== */
const TS = 16;
let grid, gridW, gridH, solidSet, waterRects;

function buildLevelStatics() {
  grid = level.grid;
  gridH = grid.length;
  gridW = grid[0].length;
  const solidNames = new Set(["grass_top","dirt","edge_left","edge_right","platform"]);
  solidSet = new Set(level.tileNames.map((n, i) => solidNames.has(n) ? i : -1).filter(i => i >= 0));
  waterRects = level.water.map(([tx, ty, tw, th]) => ({ x: tx*TS, y: ty*TS, w: tw*TS, h: th*TS }));
}

function isSolid(tx, ty) {
  if (tx < 0 || tx >= gridW) return true;      // level edges are walls
  if (ty < 0 || ty >= gridH) return false;     // open sky above, open pit below
  const t = grid[ty][tx];
  return t >= 0 && solidSet.has(t);
}
function rectHitsSolid(x, y, w, h) {
  const x0 = Math.floor(x / TS), x1 = Math.floor((x + w - 0.001) / TS);
  const y0 = Math.floor(y / TS), y1 = Math.floor((y + h - 0.001) / TS);
  for (let ty = y0; ty <= y1; ty++)
    for (let tx = x0; tx <= x1; tx++)
      if (isSolid(tx, ty)) return true;
  return false;
}
function pointInWater(x, y) {
  for (const r of waterRects)
    if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return r;
  return null;
}

// Axis-separated AABB vs tile-grid movement. opts.corner enables the
// player-only corner correction (ledge-lip step-up + ceiling-edge slip).
function moveAndCollide(e, opts = {}) {
  e.hitWall = false;

  // --- X axis ---
  e.x += e.vx;
  if (e.vx !== 0) {
    const dir = Math.sign(e.vx);
    const tx = Math.floor((dir > 0 ? e.x + e.w - 0.001 : e.x) / TS);
    const ty0 = Math.floor(e.y / TS), ty1 = Math.floor((e.y + e.h - 0.001) / TS);
    const hits = [];
    for (let ty = ty0; ty <= ty1; ty++) if (isSolid(tx, ty)) hits.push(ty);
    if (hits.length) {
      let resolved = false;
      // ledge-lip step-up: airborne, only the bottom sliver clips, and there's room above
      if (opts.corner && !e.grounded && hits.length === 1 && hits[0] === ty1) {
        const pen = (e.y + e.h) - ty1 * TS;
        if (pen > 0 && pen <= T.CORNER_CORRECTION_PX &&
            !rectHitsSolid(e.x, ty1 * TS - e.h, e.w, e.h)) {
          e.y = ty1 * TS - e.h;
          resolved = true;
        }
      }
      if (!resolved) {
        e.x = dir > 0 ? tx * TS - e.w : (tx + 1) * TS;
        e.vx = 0;
        e.hitWall = true;
      }
    }
  }

  // --- Y axis ---
  e.y += e.vy;
  e.grounded = false;
  if (e.vy !== 0) {
    const dir = Math.sign(e.vy);
    const ty = Math.floor((dir > 0 ? e.y + e.h - 0.001 : e.y) / TS);
    const tx0 = Math.floor(e.x / TS), tx1 = Math.floor((e.x + e.w - 0.001) / TS);
    const hits = [];
    for (let tx = tx0; tx <= tx1; tx++) if (isSolid(tx, ty)) hits.push(tx);
    if (hits.length) {
      let resolved = false;
      // ceiling-edge slip: rising and only barely clipping one edge of a tile — slide sideways
      if (dir < 0 && opts.corner && hits.length === 1) {
        if (hits[0] === tx0) {
          const pen = (tx0 + 1) * TS - e.x;
          if (pen <= T.CORNER_CORRECTION_PX && !rectHitsSolid((tx0 + 1) * TS, e.y, e.w, e.h)) {
            e.x = (tx0 + 1) * TS;
            resolved = true;
          }
        } else if (hits[0] === tx1) {
          const pen = (e.x + e.w) - tx1 * TS;
          if (pen <= T.CORNER_CORRECTION_PX && !rectHitsSolid(tx1 * TS - e.w, e.y, e.w, e.h)) {
            e.x = tx1 * TS - e.w;
            resolved = true;
          }
        }
      }
      if (!resolved) {
        if (dir > 0) { e.y = ty * TS - e.h; e.grounded = true; }
        else         { e.y = (ty + 1) * TS; }
        e.vy = 0;
      }
    }
  }
}

const overlaps = (a, b) =>
  a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;

/* ===================== game state ===================== */
const game = {
  state: "loading",   // loading | title | play | pause | dying | winpause | nameentry | scores
  frame: 0,
  camX: 0, camY: 0, shake: 0,
  won: false,
  stateTimer: 0,
};
const highScores = [];   // in-memory only: {name, score}
let player, enemies, boss, pickups, floaters;

const ENEMY_DEFS = {
  frog:      { w: 20, h: 16, sheet: "frog",      hp: 1 },
  cockroach: { w: 24, h: 12, sheet: "cockroach", hp: 1 },
  dino:      { w: 26, h: 24, sheet: "dino",      hp: T.DINO_HP },
};

function makePlayer() {
  return {
    x: level.spawn.x, y: level.spawn.y,
    w: T.PLAYER_W, h: T.PLAYER_H,
    vx: 0, vy: 0,
    grounded: false, hitWall: false,
    coyote: 0, jumpBuffer: 0, jumping: false,
    facing: 1,
    form: "swan",            // "swan" | "mermaid" (water only)
    inWater: false, strokeCD: 0,
    hearts: T.MAX_HEARTS,
    happiness: T.HAPPINESS_MAX,
    iframes: 0,
    animTimer: 0,
    lastSafeX: level.spawn.x, lastSafeY: level.spawn.y,
    score: 0, stars: 0,
    prevBottom: 0,
  };
}
function makeEnemies() {
  return level.enemies.map(e => {
    const d = ENEMY_DEFS[e.type];
    return { type: e.type, ...structuredClone(d),
             x: e.x, y: e.y, vx: 0, vy: 0, dir: -1,
             grounded: false, hitWall: false,
             state: "idle", timer: T.FROG_HOP_INTERVAL,
             iframes: 0, deadTimer: 0, alive: true, animTimer: 0 };
  });
}
function makeBoss() {
  if (!level.boss) return null;
  return { x: level.boss.x, y: level.boss.y, w: 52, h: 48,
           vx: 0, vy: 0, grounded: false, hitWall: false,
           hp: T.BOSS_HP, state: "dormant", timer: 0,
           iframes: 0, hurtFlash: 0, facing: -1, alive: true };
}
function makePickups() {
  return level.pickups.map((p, i) => ({ type: p.type, x: p.x, y: p.y, taken: false, seed: i * 1.7 }));
}

function resetGame() {           // brand-new run (from title)
  player = makePlayer();
  enemies = makeEnemies();
  boss = makeBoss();
  pickups = makePickups();
  floaters = [];
  game.won = false;
  game.camX = 0; game.camY = 0; game.shake = 0;
}
function respawnAfterDeath() {   // hearts hit zero: back to spawn, boss resets, world stays cleared
  player.x = level.spawn.x; player.y = level.spawn.y;
  player.vx = 0; player.vy = 0;
  player.hearts = T.MAX_HEARTS;
  player.happiness = T.HAPPINESS_MAX;
  player.iframes = 60;
  player.form = "swan";
  player.lastSafeX = level.spawn.x; player.lastSafeY = level.spawn.y;
  if (boss && boss.alive) { Object.assign(boss, makeBoss()); }
}

function addFloater(x, y, text) {
  floaters.push({ x, y, text, timer: 45 });
}

/* ===================== player update ===================== */
function speedMult() { return player.happiness <= 0 ? T.PANIC_PLAYER_MULT : 1; }
function enemyMult() { return player.happiness <= 0 ? T.PANIC_ENEMY_MULT : 1; }

function updatePlayer() {
  const p = player;
  const dir = (held.left ? -1 : 0) + (held.right ? 1 : 0);
  if (dir !== 0) p.facing = dir;
  p.prevBottom = p.y + p.h;

  const wasInWater = p.inWater;
  const waterRect = pointInWater(p.x + p.w / 2, p.y + p.h / 2);
  p.inWater = !!waterRect;
  if (p.inWater && !wasInWater) p.vy *= T.WATER_ENTRY_DAMP;   // splashdown
  if (!p.inWater && p.form === "mermaid") {
    p.form = "swan";                                          // legs don't work on land
  }

  if (p.inWater) {
    /* ---- swimming ---- */
    if (pressed("transform")) {
      p.form = p.form === "swan" ? "mermaid" : "swan";
      addFloater(p.x + p.w / 2, p.y - 6, p.form === "mermaid" ? "MERMAID!" : "SWAN!");
    }
    const accel = (p.form === "mermaid" ? T.WATER_ACCEL_MERMAID : T.WATER_ACCEL_SWAN);
    const max = (p.form === "mermaid" ? T.WATER_MAX_SPEED_MERMAID : T.WATER_MAX_SPEED_SWAN) * speedMult();
    if (dir !== 0) p.vx += dir * accel;
    else {
      const d = Math.min(Math.abs(p.vx), T.WATER_DRAG);
      p.vx -= Math.sign(p.vx) * d;
    }
    p.vx = Math.max(-max, Math.min(max, p.vx));

    if (p.strokeCD > 0) p.strokeCD--;
    if (pressed("jump") && p.strokeCD <= 0) {
      const nearSurface = (p.y + p.h / 2) - waterRect.y < T.WATER_EXIT_ZONE;
      if (nearSurface) {
        p.vy = -T.WATER_EXIT_BOOST;       // leap out of the lake
      } else {
        const stroke = p.form === "mermaid" ? T.SWIM_STROKE_MERMAID : T.SWIM_STROKE_SWAN;
        p.vy = Math.min(p.vy, -stroke * speedMult());
      }
      p.strokeCD = T.SWIM_STROKE_COOLDOWN;
    }
    p.vy = Math.min(p.vy + T.WATER_GRAVITY, T.WATER_MAX_FALL);
    p.coyote = 0; p.jumpBuffer = 0; p.jumping = false;
  } else {
    /* ---- on land / in air: the SMB part ---- */
    const max = T.MAX_RUN_SPEED * speedMult();
    if (dir !== 0) {
      let a = p.grounded ? T.GROUND_ACCEL : T.AIR_ACCEL;
      if (p.grounded && p.vx !== 0 && Math.sign(p.vx) !== dir) a = T.TURN_ACCEL; // skid grip
      p.vx += dir * a;
      if (Math.abs(p.vx) > max) p.vx = Math.sign(p.vx) * Math.max(max, Math.abs(p.vx) - T.GROUND_DECEL);
    } else {
      const d = p.grounded ? T.GROUND_DECEL : T.AIR_DECEL;
      const drop = Math.min(Math.abs(p.vx), d);
      p.vx -= Math.sign(p.vx) * drop;
    }

    // coyote time + jump buffering
    p.coyote = p.grounded ? T.COYOTE_FRAMES : Math.max(0, p.coyote - 1);
    if (pressed("jump")) p.jumpBuffer = T.JUMP_BUFFER_FRAMES;
    else if (p.jumpBuffer > 0) p.jumpBuffer--;

    if (p.jumpBuffer > 0 && p.coyote > 0) {
      p.vy = -T.JUMP_VEL;
      p.jumping = true;
      p.jumpBuffer = 0;
      p.coyote = 0;
    }
    // variable height: releasing jump early cuts the rise
    if (p.jumping && !held.jump && p.vy < 0) {
      p.vy *= T.JUMP_CUT_MULT;
      p.jumping = false;
    }
    // gravity, with the apex float
    let g = p.vy < 0 ? T.GRAVITY_RISE : T.GRAVITY_FALL;
    if (!p.grounded && Math.abs(p.vy) < T.APEX_SPEED) g *= T.APEX_GRAVITY_MULT;
    p.vy = Math.min(p.vy + g, T.MAX_FALL_SPEED);
  }

  moveAndCollide(p, { corner: true });

  if (p.grounded && !p.inWater) { p.lastSafeX = p.x; p.lastSafeY = p.y; }
  if (p.iframes > 0) p.iframes--;

  // happiness drains the entire time you're awake in the dream
  p.happiness = Math.max(0, p.happiness - T.HAPPINESS_DRAIN);

  // fell out of the dream
  if (p.y > gridH * TS + 48) {
    p.hearts--;
    if (p.hearts <= 0) { respawnAfterDeath(); }
    else {
      p.x = p.lastSafeX; p.y = p.lastSafeY;
      p.vx = 0; p.vy = 0;
      p.iframes = T.IFRAMES;
    }
  }

  p.animTimer++;
}

function hurtPlayer(fromX) {
  const p = player;
  if (p.iframes > 0 || game.state !== "play") return;
  p.hearts--;
  p.iframes = T.IFRAMES;
  p.vx = (p.x + p.w / 2 < fromX ? -1 : 1) * T.KNOCKBACK_X;
  p.vy = -T.KNOCKBACK_Y;
  if (p.hearts <= 0) {
    game.state = "dying";
    game.stateTimer = 70;
    p.vy = -4.5;
  }
}

function playerHurtbox() {
  const i = T.HURTBOX_INSET, p = player;
  return { x: p.x + i, y: p.y + i, w: p.w - 2 * i, h: p.h - 2 * i };
}
function playerStompbox() {
  const m = T.STOMP_MARGIN, p = player;
  return { x: p.x - m, y: p.y, w: p.w + 2 * m, h: p.h };
}

// Returns "stomp", "hurt", or null for a contact between player and box `b`.
function classifyContact(b) {
  const p = player;
  if (overlaps(playerStompbox(), b) &&
      p.vy > 0.5 && p.prevBottom <= b.y + T.STOMP_GRACE) return "stomp";
  if (overlaps(playerHurtbox(), b)) return "hurt";
  return null;
}
function bouncePlayer() {
  player.vy = -(held.jump ? T.STOMP_BOUNCE_HELD : T.STOMP_BOUNCE);
  player.jumping = !!held.jump;   // only a held bounce is jump-cuttable
}

/* ===================== enemies ===================== */
function updateEnemies() {
  const mult = enemyMult();
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.deadTimer > 0) {            // squashed: linger a moment, then vanish
      if (--e.deadTimer <= 0) e.alive = false;
      continue;
    }
    e.animTimer++;
    if (e.iframes > 0) e.iframes--;

    if (e.type === "frog") {
      const dist = Math.abs((player.x + player.w / 2) - (e.x + e.w / 2));
      if (e.state === "idle") {
        e.vx = 0;
        if (dist < T.FROG_RANGE && --e.timer <= 0) {
          e.state = "windup"; e.timer = T.FROG_WINDUP;
          e.dir = player.x > e.x ? 1 : -1;
        }
      } else if (e.state === "windup") {
        if (--e.timer <= 0) {
          e.state = "air";
          e.vx = e.dir * T.FROG_HOP_VX * mult;
          e.vy = -T.FROG_HOP_VY;
        }
      } else if (e.state === "air" && e.grounded) {
        e.state = "idle"; e.timer = Math.round(T.FROG_HOP_INTERVAL / mult); e.vx = 0;
      }
    } else if (e.type === "cockroach" || e.type === "dino") {
      const speed = (e.type === "cockroach" ? T.ROACH_SPEED : T.DINO_SPEED) * mult;
      e.vx = e.dir * speed;
      if (e.grounded) {
        // turn at walls and at ledges
        const aheadX = e.dir > 0 ? e.x + e.w + 1 : e.x - 1;
        const footTx = Math.floor(aheadX / TS);
        const footTy = Math.floor((e.y + e.h + 2) / TS);
        if (e.hitWall || !isSolid(footTx, footTy)) e.dir *= -1;
      }
    }

    e.vy = Math.min(e.vy + T.ENEMY_GRAVITY, T.ENEMY_MAX_FALL);
    moveAndCollide(e);   // walkers read e.hitWall next frame and turn then
    if (e.y > gridH * TS + 64) { e.alive = false; continue; }

    // contact with the player
    const kind = classifyContact(e);
    if (kind === "stomp" && e.iframes <= 0) {
      e.hp--;
      bouncePlayer();
      if (e.hp <= 0) {
        e.deadTimer = 18; e.vx = 0; e.vy = 0;
        player.score += T.POINTS_STOMP;
        addFloater(e.x + e.w / 2, e.y - 4, "+" + T.POINTS_STOMP);
      } else {
        e.iframes = T.ENEMY_HIT_IFRAMES;
        addFloater(e.x + e.w / 2, e.y - 4, "BONK");
      }
    } else if (kind === "hurt") {
      hurtPlayer(e.x + e.w / 2);
    }
  }
}

/* ===================== boss: Grumpis Scrumption ===================== */
function updateBoss() {
  const b = boss;
  if (!b || !b.alive) return;
  const mult = enemyMult();
  if (b.iframes > 0) b.iframes--;
  if (b.hurtFlash > 0) b.hurtFlash--;

  if (b.state === "dying") {
    if (--b.timer <= 0) {
      b.alive = false;
      player.score += T.POINTS_BOSS;
      addFloater(b.x + b.w / 2, b.y, "+" + T.POINTS_BOSS);
      spawnTrophy();
    }
  } else if (b.state === "dormant") {
    const dist = Math.abs((player.x + player.w / 2) - (b.x + b.w / 2));
    if (dist < T.BOSS_ACTIVATE_DIST) { b.state = "windup"; b.timer = T.BOSS_WINDUP; }
  } else if (b.state === "windup") {
    b.facing = player.x > b.x ? 1 : -1;
    if (--b.timer <= 0) {
      b.state = "lunge";
      b.vx = b.facing * T.BOSS_LUNGE_VX * mult;
      b.vy = -T.BOSS_LUNGE_VY;
    }
  } else if (b.state === "lunge") {
    if (b.grounded && b.vy >= 0) {
      b.state = "recover"; b.timer = Math.round(T.BOSS_RECOVER / mult);
      b.vx = 0;
      game.shake = T.SHAKE_FRAMES;
    }
  } else if (b.state === "recover") {
    if (--b.timer <= 0) { b.state = "windup"; b.timer = T.BOSS_WINDUP; }
  }

  if (b.state !== "dying") {
    b.vy = Math.min(b.vy + T.ENEMY_GRAVITY, T.ENEMY_MAX_FALL);
    moveAndCollide(b);

    const kind = classifyContact(b);
    if (kind === "stomp" && b.iframes <= 0) {
      b.hp--;
      b.iframes = T.BOSS_IFRAMES;
      b.hurtFlash = T.BOSS_HURT_FLASH;
      bouncePlayer();
      addFloater(b.x + b.w / 2, b.y - 6, "SCRUMPTIONED!");
      if (b.hp <= 0) { b.state = "dying"; b.timer = T.BOSS_DEATH_FRAMES; b.vx = 0; }
    } else if (kind === "hurt") {
      hurtPlayer(b.x + b.w / 2);
    }
  }
}

function spawnTrophy() {
  // the trophy waits at goalX, resting on the ground below it
  const tx = Math.floor(level.goalX / TS);
  let ty = 0;
  while (ty < gridH && !isSolid(tx, ty)) ty++;
  pickups.push({ type: "trophy", x: level.goalX - 8, y: ty * TS - 18, taken: false, seed: 0 });
}

/* ===================== pickups ===================== */
function updatePickups() {
  const p = player;
  const pbox = { x: p.x, y: p.y, w: p.w, h: p.h };
  for (const pk of pickups) {
    if (pk.taken) continue;
    const bob = Math.sin((game.frame + pk.seed * 37) / 18) * 2;
    const box = { x: pk.x, y: pk.y + bob, w: 16, h: 16 };
    if (!overlaps(pbox, box)) continue;
    pk.taken = true;
    if (pk.type === "popcorn") {
      p.score += T.POINTS_POPCORN;
      addFloater(pk.x + 8, pk.y - 4, "+" + T.POINTS_POPCORN);
    } else if (pk.type === "star") {
      p.stars++;
      addFloater(pk.x + 8, pk.y - 4, "STAR!");
    } else if (pk.type === "treat") {
      p.happiness = Math.min(T.HAPPINESS_MAX, p.happiness + T.TREAT_REFILL);
      addFloater(pk.x + 8, pk.y - 4, "YUM!");
    } else if (pk.type === "trophy") {
      game.won = true;
      game.state = "winpause";
      game.stateTimer = 110;
    }
  }
  // fallback win line: only counts once Grumpis is gone
  if ((!boss || !boss.alive) && player.x > level.goalX && !game.won && game.state === "play") {
    game.won = true;
    game.state = "winpause";
    game.stateTimer = 110;
  }
}

/* ===================== floaters (score popups) ===================== */
function updateFloaters() {
  for (const f of floaters) { f.timer--; f.y -= 0.5; }
  floaters = floaters.filter(f => f.timer > 0);
}

/* ===================== camera ===================== */
function updateCamera() {
  const p = player;
  const targetX = p.x + p.w / 2 + p.facing * T.CAM_LOOKAHEAD - T.VIEW_W / 2;
  const targetY = p.y + p.h / 2 - T.VIEW_H / 2;
  game.camX += (targetX - game.camX) * T.CAM_LERP;
  game.camY += (targetY - game.camY) * T.CAM_LERP;
  game.camX = Math.max(0, Math.min(gridW * TS - T.VIEW_W, game.camX));
  game.camY = Math.max(0, Math.min(gridH * TS - T.VIEW_H, game.camY));
  if (game.shake > 0) game.shake--;
}

/* ===================== name-entry store ===================== */
const STORE_GRID = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").concat(["RUB", "END"]); // 7 x 4
const STORE_COLS = 7;
let store = null;
function openStore() {
  store = { wallet: player.score, name: "", cursor: 0 };
  game.state = "nameentry";
}
function updateStore() {
  const s = store;
  if (pressed("left"))  s.cursor = (s.cursor + STORE_GRID.length - 1) % STORE_GRID.length;
  if (pressed("right")) s.cursor = (s.cursor + 1) % STORE_GRID.length;
  if (pressed("up"))    s.cursor = (s.cursor + STORE_GRID.length - STORE_COLS) % STORE_GRID.length;
  if (pressed("down"))  s.cursor = (s.cursor + STORE_COLS) % STORE_GRID.length;
  if (pressed("rub")) rubLetter();
  if (pressed("confirm")) {
    const pick = STORE_GRID[s.cursor];
    if (pick === "END") finalizeName();
    else if (pick === "RUB") rubLetter();
    else if (s.name.length < T.NAME_MAX_LEN) {
      if (s.wallet >= T.LETTER_COST) {
        s.wallet -= T.LETTER_COST;
        s.name += pick;
      } else {
        finalizeName();   // out of points: the name truncates right here
      }
    }
  }
}
function rubLetter() {
  if (store.name.length > 0) {
    store.name = store.name.slice(0, -1);
    store.wallet += T.LETTER_COST;
  }
}
function finalizeName() {
  const name = store.name.length ? store.name : "SWAN";
  highScores.push({ name, score: store.wallet });   // what you didn't spend is your score
  highScores.sort((a, b) => b.score - a.score);
  highScores.length = Math.min(highScores.length, 5);
  game.state = "scores";
}

/* ===================== update dispatch ===================== */
function update() {
  game.frame++;
  switch (game.state) {
    case "title":
      if (pressed("confirm")) { resetGame(); game.state = "play"; }
      break;
    case "play":
      if (pressed("pause")) { game.state = "pause"; break; }
      updatePlayer();
      updateEnemies();
      updateBoss();
      updatePickups();
      updateFloaters();
      updateCamera();
      break;
    case "pause":
      if (pressed("pause") || pressed("confirm")) game.state = "play";
      break;
    case "dying":
      player.vy = Math.min(player.vy + T.GRAVITY_FALL, T.MAX_FALL_SPEED);
      player.y += player.vy;     // no collision: fall out of the dream
      if (--game.stateTimer <= 0) { respawnAfterDeath(); game.state = "play"; }
      break;
    case "winpause":
      updateFloaters();
      if (--game.stateTimer <= 0) openStore();
      break;
    case "nameentry":
      updateStore();
      break;
    case "scores":
      if (pressed("confirm")) game.state = "title";
      break;
  }
  justPressed.clear();
}

/* ===================== rendering ===================== */
const SKY = "#262339";
const WATER_TINT = "rgba(86,134,219,0.35)";
const WATER_LINE = "rgba(190,220,255,0.55)";

function render() {
  ctx.setTransform(T.SCALE, 0, 0, T.SCALE, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = SKY;
  ctx.fillRect(0, 0, T.VIEW_W, T.VIEW_H);

  if (game.state === "loading") { drawCenterText("LOADING THE DREAM..."); return; }
  if (game.state === "title")   { drawTitle(); return; }
  if (game.state === "nameentry") { drawStore(); return; }
  if (game.state === "scores")  { drawScores(); return; }

  // world camera (with boss-landing shake)
  let camRX = Math.round(game.camX), camRY = Math.round(game.camY);
  if (game.shake > 0) {
    camRX += Math.round((Math.random() - 0.5) * 4);
    camRY += Math.round((Math.random() - 0.5) * 3);
  }

  drawTiles(camRX, camRY);
  drawWater(camRX, camRY);
  drawPickups(camRX, camRY);
  drawEnemies(camRX, camRY);
  drawBoss(camRX, camRY);
  drawPlayer(camRX, camRY);
  drawFloaters(camRX, camRY);
  drawHUD();

  if (game.state === "pause") {
    dimScreen();
    drawCenterText("PAUSED", -8);
    drawCenterText("ESC / ENTER TO RESUME", 8, "10px");
  }
  if (game.state === "winpause") {
    dimScreen();
    drawFrame("hud", "trophy", T.VIEW_W / 2 - 8, T.VIEW_H / 2 - 34);
    drawCenterText("GRUMPIS SCRUMPTION DEFEATED!", -4);
    drawCenterText("THE DREAM IS SAVED", 12, "10px");
  }
}

function drawTiles(camRX, camRY) {
  const x0 = Math.max(0, Math.floor(camRX / TS));
  const x1 = Math.min(gridW - 1, Math.floor((camRX + T.VIEW_W) / TS));
  for (let ty = 0; ty < gridH; ty++) {
    for (let tx = x0; tx <= x1; tx++) {
      const t = grid[ty][tx];
      if (t < 0) continue;
      drawFrame("tiles", level.tileNames[t], tx * TS - camRX, ty * TS - camRY);
    }
  }
}

// Water is a translucent tint + surface line (no water tile exists in the
// manifest; this is UI-style shading, not sprite art).
function drawWater(camRX, camRY) {
  for (const r of waterRects) {
    ctx.fillStyle = WATER_TINT;
    ctx.fillRect(Math.round(r.x - camRX), Math.round(r.y - camRY), r.w, r.h);
    ctx.fillStyle = WATER_LINE;
    ctx.fillRect(Math.round(r.x - camRX), Math.round(r.y - camRY), r.w, 1);
  }
}

function drawPickups(camRX, camRY) {
  for (const pk of pickups) {
    if (pk.taken) continue;
    const bob = Math.sin((game.frame + pk.seed * 37) / 18) * 2;
    drawFrame("hud", pk.type, pk.x - camRX, pk.y + bob - camRY);
  }
}

function drawEnemies(camRX, camRY) {
  for (const e of enemies) {
    if (!e.alive) continue;
    const s = sheets[ENEMY_DEFS[e.type].sheet];
    const dx = e.x + e.w / 2 - s.frame_w / 2 - camRX;
    const dy = e.y + e.h - s.frame_h - camRY;
    if (e.iframes > 0 && (e.iframes >> 2) % 2 === 0) continue;   // hit blink
    if (e.deadTimer > 0) {
      // squash the corpse flat (still the same sprite, just scaled)
      ctx.save();
      ctx.translate(Math.round(dx), Math.round(e.y + e.h - camRY));
      ctx.scale(1, 0.4);
      ctx.drawImage(s.img, s.index[firstFrame(e)] * s.frame_w, 0, s.frame_w, s.frame_h,
                    0, -s.frame_h, s.frame_w, s.frame_h);
      ctx.restore();
      continue;
    }
    drawFrame(ENEMY_DEFS[e.type].sheet, enemyFrame(e), dx, dy, e.dir > 0 ? false : true);
  }
}
function firstFrame(e) { return sheets[ENEMY_DEFS[e.type].sheet].frames[0]; }
function enemyFrame(e) {
  if (e.type === "frog") return e.state === "air" ? "hop" : "idle";
  if (e.type === "cockroach") return (e.animTimer >> 3) % 2 ? "scuttle2" : "scuttle1";
  return (e.animTimer >> 4) % 2 ? "walk2" : "walk1";   // dino
}

function drawBoss(camRX, camRY) {
  const b = boss;
  if (!b || !b.alive) return;
  if (b.iframes > 0 && b.hurtFlash <= 0 && (b.iframes >> 2) % 2 === 0) return;
  let frame = "idle";
  if (b.hurtFlash > 0) frame = "hurt";
  else if (b.state === "lunge") frame = "attack";
  let dx = b.x + b.w / 2 - 32 - camRX;
  let dy = b.y + b.h - 64 - camRY;
  if (b.state === "windup") dx += ((game.frame >> 2) % 2) * 2 - 1;   // telegraph shake
  if (b.state === "dying") { if ((game.frame >> 2) % 2 === 0) return; frame = "hurt"; }
  drawFrame("boss_grumpis", frame, dx, dy, b.facing > 0);
}

function drawPlayer(camRX, camRY) {
  const p = player;
  if (game.state === "play" && p.iframes > 0 && (p.iframes >> 2) % 2 === 0) return;  // hit blink
  let sheet = "swan", frame = "idle";
  if (p.inWater) {
    sheet = p.form;
    const moving = Math.abs(p.vx) > 0.2 || Math.abs(p.vy) > 0.3;
    if (p.form === "mermaid") frame = moving ? ((p.animTimer >> 3) % 2 ? "swim2" : "swim1") : "idle";
    else frame = (p.animTimer >> 3) % 2 ? "swim2" : "swim1";
  } else if (!p.grounded) {
    frame = "jump";
  } else if (Math.abs(p.vx) > 0.15) {
    frame = (p.animTimer >> 3) % 2 ? "walk2" : "walk1";
  }
  const s = sheets[sheet];
  drawFrame(sheet, frame,
            p.x + p.w / 2 - s.frame_w / 2 - camRX,
            p.y + p.h - s.frame_h - camRY,
            p.facing < 0);
}

function drawFloaters(camRX, camRY) {
  ctx.font = "8px monospace";
  ctx.textAlign = "center";
  for (const f of floaters) {
    ctx.fillStyle = f.timer > 15 ? "#fff6d8" : "rgba(255,246,216,0.5)";
    ctx.fillText(f.text, Math.round(f.x - camRX), Math.round(f.y - camRY));
  }
  ctx.textAlign = "left";
}

/* ---- HUD ---- */
function drawHUD() {
  const p = player;
  // hearts
  for (let i = 0; i < T.MAX_HEARTS; i++)
    drawFrame("hud", i < p.hearts ? "heart_full" : "heart_empty", 6 + i * 15, 5);
  // happiness bar: smiley cap + repeated segments (1 segment per 10 happiness)
  const panic = p.happiness <= 0;
  if (!panic || (game.frame >> 3) % 2) drawFrame("hud", "happy_smiley", 6, 22);
  const segs = Math.ceil(p.happiness / 10);
  for (let i = 0; i < segs; i++) drawFrame("hud", "happy_seg", 24 + i * 8, 22);
  if (panic) {
    ctx.fillStyle = (game.frame >> 3) % 2 ? "#ff7a7a" : "#ffd1d1";
    ctx.font = "8px monospace";
    ctx.fillText("PANIC!", 26, 33);
  }
  // popcorn = points, star = collectibles
  ctx.font = "8px monospace";
  ctx.fillStyle = "#fff6d8";
  drawFrame("hud", "popcorn", T.VIEW_W - 64, 5);
  ctx.fillText(String(p.score).padStart(6, "0"), T.VIEW_W - 46, 16);
  drawFrame("hud", "star", T.VIEW_W - 64, 22);
  ctx.fillText("x" + p.stars, T.VIEW_W - 46, 33);
  if (game.won) drawFrame("hud", "trophy", T.VIEW_W - 82, 5);
}

/* ---- full-screen text states ---- */
function dimScreen() {
  ctx.fillStyle = "rgba(12,10,20,0.6)";
  ctx.fillRect(0, 0, T.VIEW_W, T.VIEW_H);
}
function drawCenterText(text, dy = 0, font = "12px") {
  ctx.font = font + " monospace";
  ctx.textAlign = "center";
  ctx.fillStyle = "#fff6d8";
  ctx.fillText(text, T.VIEW_W / 2, T.VIEW_H / 2 + dy);
  ctx.textAlign = "left";
}

function drawTitle() {
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffe48a";
  ctx.font = "bold 17px monospace";
  ctx.fillText("MOONFLEX", T.VIEW_W / 2, 52);
  ctx.fillText("FORCE ABILITIES", T.VIEW_W / 2, 70);
  ctx.font = "8px monospace";
  ctx.fillStyle = "#b9b2d8";
  ctx.fillText("a dream-lake vertical slice", T.VIEW_W / 2, 84);

  drawFrame("swan", (game.frame >> 4) % 2 ? "walk1" : "idle", T.VIEW_W / 2 - 20, 96);

  ctx.fillStyle = "#fff6d8";
  ctx.font = "9px monospace";
  ctx.fillText("ARROWS/AD MOVE   SPACE/W/UP JUMP", T.VIEW_W / 2, 152);
  ctx.fillText("SHIFT/E TRANSFORM (IN WATER)   ESC PAUSE", T.VIEW_W / 2, 164);
  if ((game.frame >> 4) % 2) {
    ctx.fillStyle = "#ffe48a";
    ctx.font = "11px monospace";
    ctx.fillText("PRESS ENTER", T.VIEW_W / 2, 188);
  }
  if (highScores.length) {
    ctx.font = "8px monospace";
    ctx.fillStyle = "#b9b2d8";
    ctx.fillText("BEST: " + highScores[0].name + " " + highScores[0].score, T.VIEW_W / 2, 210);
  }
  ctx.textAlign = "left";
  // TODO(hub): this screen becomes the hub house + elevator level select
}

function drawStore() {
  const s = store;
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffe48a";
  ctx.font = "bold 12px monospace";
  ctx.fillText("SPELL YOUR NAME", T.VIEW_W / 2, 30);
  ctx.font = "8px monospace";
  ctx.fillStyle = "#b9b2d8";
  ctx.fillText("EACH LETTER COSTS " + T.LETTER_COST + " PTS — UNSPENT PTS = YOUR SCORE", T.VIEW_W / 2, 44);

  ctx.fillStyle = "#fff6d8";
  ctx.font = "12px monospace";
  const shown = s.name + (s.name.length < T.NAME_MAX_LEN ? "_" : "");
  ctx.fillText(shown, T.VIEW_W / 2, 66);
  ctx.font = "9px monospace";
  ctx.fillStyle = s.wallet >= T.LETTER_COST ? "#9fe8a0" : "#ff7a7a";
  ctx.fillText("WALLET: " + s.wallet, T.VIEW_W / 2, 82);
  if (s.wallet < T.LETTER_COST) {
    ctx.fillStyle = "#ff7a7a";
    ctx.fillText("OUT OF POINTS — ANY LETTER ENDS THE NAME", T.VIEW_W / 2, 94);
  }

  const gx0 = T.VIEW_W / 2 - (STORE_COLS * 22) / 2 + 11;
  for (let i = 0; i < STORE_GRID.length; i++) {
    const col = i % STORE_COLS, row = Math.floor(i / STORE_COLS);
    const x = gx0 + col * 22, y = 116 + row * 18;
    const isCursor = i === s.cursor;
    if (isCursor) {
      ctx.fillStyle = "#ffe48a";
      ctx.fillRect(x - 10, y - 11, 20, 14);
    }
    ctx.fillStyle = isCursor ? "#16131f" : "#fff6d8";
    ctx.font = STORE_GRID[i].length > 1 ? "7px monospace" : "10px monospace";
    ctx.fillText(STORE_GRID[i], x, y);
  }
  ctx.fillStyle = "#b9b2d8";
  ctx.font = "8px monospace";
  ctx.fillText("ARROWS MOVE   ENTER BUY   BACKSPACE REFUND", T.VIEW_W / 2, 204);
  ctx.textAlign = "left";
}

function drawScores() {
  ctx.textAlign = "center";
  drawFrame("hud", "trophy", T.VIEW_W / 2 - 8, 28);
  ctx.fillStyle = "#ffe48a";
  ctx.font = "bold 12px monospace";
  ctx.fillText("HIGH SCORES", T.VIEW_W / 2, 64);
  ctx.font = "10px monospace";
  for (let i = 0; i < highScores.length; i++) {
    const h = highScores[i];
    ctx.fillStyle = i === 0 ? "#fff6d8" : "#b9b2d8";
    ctx.fillText((i + 1) + ". " + h.name.padEnd(T.NAME_MAX_LEN, ".") + "  " + String(h.score).padStart(6, "0"),
                 T.VIEW_W / 2, 90 + i * 16);
  }
  if ((game.frame >> 4) % 2) {
    ctx.fillStyle = "#ffe48a";
    ctx.font = "9px monospace";
    ctx.fillText("ENTER: BACK TO TITLE", T.VIEW_W / 2, 200);
  }
  ctx.textAlign = "left";
}

/* ===================== main loop (fixed 60 Hz sim) ===================== */
const STEP = 1000 / 60;
let acc = 0, last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  acc += Math.min(now - last, 100);   // clamp away tab-switch spirals
  last = now;
  while (acc >= STEP) { update(); acc -= STEP; }
  render();
}

loadAll().then(() => {
  buildLevelStatics();
  resetGame();
  game.state = "title";
}).catch(err => {
  game.state = "loading";
  document.title = "asset load failed: " + err.message;
  console.error(err);
});
requestAnimationFrame(loop);
</script>
